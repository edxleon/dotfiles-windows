# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g default-shell /bin/zsh

# Renumber windows when one is closed
set -g renumber-windows on

# Status bar updates every second (real-time clock)
set -g status-interval 1

# Display messages for 2 seconds
set -g display-time 2000
set -g display-panes-time 2000

# Notify on window activity
setw -g monitor-activity on
set -g visual-activity off

# ── Prefix: C-Space ───────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload / edit config ──────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind e new-window -n "~/.tmux.conf.local" \
    "sh -c '\${EDITOR:-vim} ~/.tmux.conf.local && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"

# ── Splits ────────────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# ── Pane navigation (vim-aware Alt+hjkl) ─────────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

# ── Swap panes ────────────────────────────────────────────────────────────────
bind -n M-W swap-pane -U
bind -n M-S swap-pane -D

# ── Window switching: Alt+1-9 ─────────────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Vi copy mode ──────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v      send-keys -X begin-selection
bind -T copy-mode-vi y      send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Mouse toggle ──────────────────────────────────────────────────────────────
set -g mouse on
bind m set -g mouse \; display "Mouse #{?mouse,on,off}"

# ── Tokyo Night ───────────────────────────────────────────────────────────────
set -g status-style       "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length  40
set -g status-right-length 60

set -g status-left  "#[bg=#73daca,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#73daca,nobold]"
set -g status-right "#[fg=#565f89] %H:%M  %d %b #[fg=#7aa2f7] #H "

setw -g window-status-format         "#[fg=#565f89] #I #W "
setw -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I #W "
setw -g window-status-activity-style "fg=#e0af68"

set -g pane-border-style        "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

set -g message-style         "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#1a1b26,fg=#7aa2f7"

set -g mode-style "bg=#7aa2f7,fg=#1a1b26"

# ── Plugins (tpm) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

run '~/.tmux/plugins/tpm/tpm'

# ── Local overrides ───────────────────────────────────────────────────────────
if-shell "[ -f ~/.tmux.conf.local ]" "source ~/.tmux.conf.local"
